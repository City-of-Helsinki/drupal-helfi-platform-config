helfi_recommendations.htmx:
  path: '/helfi_recommendations/{entity_type_id}/{entity}/htmx'
  defaults:
    _controller: '\Drupal\helfi_recommendations\Controller\HtmxController::content'
  requirements:
    _custom_access: '\Drupal\helfi_recommendations\Controller\HtmxController::access'
  options:
    _htmx_route: 'TRUE'
    parameters:
      entity:
        type: 'entity:{entity_type_id}'
