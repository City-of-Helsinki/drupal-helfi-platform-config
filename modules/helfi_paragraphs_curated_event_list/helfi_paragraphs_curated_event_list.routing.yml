helfi_paragraphs_curated_event_list.htmx:
  path: '/helfi_paragraphs_curated_event_list/{paragraph}/htmx'
  defaults:
    _controller: '\Drupal\helfi_paragraphs_curated_event_list\Controller\HtmxController::content'
  requirements:
    _permission: 'access content'
  options:
    _htmx_route: 'TRUE'
    parameters:
      paragraph:
        type: 'entity:paragraph'

