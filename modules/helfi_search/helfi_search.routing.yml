helfi_search.test_form:
  path: '/search/new/test'
  defaults:
    _form: '\Drupal\helfi_search\Form\SearchTestForm'
    _title: 'Search Embeddings Test'
  requirements:
    _permission: 'access content'

helfi_search.semantic_search:
  path: '/api/v1/search'
  defaults:
    _controller: '\Drupal\helfi_search\Controller\SearchController::search'
  requirements:
    _permission: 'access content'
  methods: [GET]

helfi_search.settings_form:
  path: '/admin/tools/helfi-search-settings'
  defaults:
    _form: '\Drupal\helfi_search\Form\SearchSettingsForm'
    _title: 'Semantic search settings'
  requirements:
    _permission: 'administer helfi_search'
  options:
    _admin_route: TRUE
