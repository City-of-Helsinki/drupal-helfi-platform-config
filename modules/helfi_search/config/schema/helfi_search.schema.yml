helfi_search.settings:
  type: config_object
  label: 'HELFI Search settings'
  mapping:
    openai_api_key:
      type: string
      label: 'OpenAI API key'
      description: 'API key for OpenAI embeddings service'
    openai_base_url:
      type: string
      label: 'OpenAI base URL'
      description: 'Base URL for OpenAI API. Use {model} placeholder for Azure per-deployment URLs (e.g. https://example.openai.azure.com/openai/deployments/{model}).'
    openai_models:
      type: sequence
      label: 'OpenAI embedding models'
      sequence:
        type: string
    openai_model_pricing:
      type: sequence
      label: 'Model pricing per million tokens (USD)'
      sequence:
        type: float
    deboost_bundles:
      type: sequence
      label: 'Bundles whose scores are de-boosted'
      sequence:
        type: string
    deboost_factor:
      type: float
      label: 'Multiplier applied to de-boosted bundle scores (0.0–1.0)'
    min_score:
      type: float
      label: 'KNN minimum similarity floor (0.0–1.0)'
    ignored_classes:
      type: sequence
      label: 'CSS classes whose elements are stripped from indexed HTML'
      sequence:
        type: string
    external_links:
      type: mapping
      label: 'Links for other searches'
      mapping:
        jobs:
          type: label
          label: 'Open jobs URL'
          translatable: true
        events:
          type: label
          label: 'Events URL'
          translatable: true
        decisions:
          type: label
          label: 'Decisions URL'
          translatable: true
        contact:
          type: label
          label: 'Contact URL'
          translatable: true
        helsinki_near_you:
          type: label
          label: 'Helsinki near you URL'
          translatable: true
    ai_register_url:
      type: label
      label: 'AI register URL'
      translatable: true
