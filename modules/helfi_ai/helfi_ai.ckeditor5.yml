# CKEditor 5 configuration for Helfi AI module.
helfi_ai_tone_check:
  # Configuration sent to the CKEditor 5 JavaScript plugin.
  ckeditor5:
    plugins:
      - aiToneCheck.aiToneCheck

  # Configuration used directly by Drupal.
  drupal:
    label: 'AI tone check'
    library: helfi_ai/tone_check
    toolbar_items:
      aiToneCheck:
        label: 'Check tone'
    # The plugin rewrites existing content; it introduces no new HTML elements.
    elements: false
    class: Drupal\helfi_ai\Plugin\CKEditor5Plugin\AiToneCheck
