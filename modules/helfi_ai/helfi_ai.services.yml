services:
  _defaults:
    autowire: true
    autoconfigure: true

  logger.channel.helfi_ai:
    parent: logger.channel_base
    arguments: ['helfi_ai']

  Drupal\helfi_ai\Service\AiChatProviderBridge:
    arguments:
      $manager: '@ai.provider'

  Drupal\helfi_ai\Service\AiSummaryGenerator:
    arguments:
      $aiProvider: '@Drupal\helfi_ai\Service\AiChatProviderBridge'
      $logger: '@logger.channel.helfi_ai'
